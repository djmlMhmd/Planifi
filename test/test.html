<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<title>Test de Socket.IO</title>
		<script src="/socket.io/socket.io.js"></script>
		<script>
			document.addEventListener('DOMContentLoaded', function () {
				const userId = '2'; // Assurez-vous de définir cet ID correctement
				const socket = io('http://localhost:3000');

				socket.on('connect', () => {
					console.log('Connecté au serveur Socket.IO');
					// Joindre une room spécifique pour recevoir des messages
					//socket.emit('join_room', 'user_room_' + userId);
				});

				document
					.getElementById('send-message')
					.addEventListener('click', function () {
						const subject =
							document.getElementById('message-subject').value;
						const body =
							document.getElementById('message-body').value;
						const serviceId =
							document.getElementById('service-select').value;
						const receiverId =
							document.getElementById('receiver-id').value;

						socket.emit('send_message', {
							subject,
							message_body: body,
							service_id: serviceId,
							sender_id: userId,
							receiver_id: receiverId,
						});
					});

				socket.on('new_message', (message) => {
					console.log('Nouveau message reçu:', message);
					const messagesContainer =
						document.getElementById('messages');
					const msgElement = document.createElement('div');
					msgElement.innerHTML = `<strong>${message.subject}</strong>: ${message.message_body}`;
					messagesContainer.appendChild(msgElement);
				});

				socket.on('message_sent', (response) => {
					console.log('Message envoyé avec succès:', response);
					alert('Message envoyé avec succès');
				});

				socket.on('message_error', (error) => {
					console.error(
						"Erreur lors de l'envoi du message:",
						error.message
					);
				});

				socket.on('disconnect', () => {
					console.log('Déconnecté du serveur Socket.IO');
				});

				socket.on('join_new_room', (info) => {
					console.log(info);
					if (info.receiver_id == userId) {
						socket.emit('join_room', {
							nom: `${info.sender_id}-${info.receiver_id}`,
						});
					}
				});
			});
		</script>
	</head>
	<body>
		<h1>Test de Socket.IO</h1>
		<input
			type="text"
			id="message-subject"
			placeholder="Sujet du message"
		/>
		<textarea id="message-body" placeholder="Corps du message"></textarea>
		<input type="text" id="service-select" placeholder="ID du service" />
		<input type="text" id="receiver-id" placeholder="ID du destinataire" />
		<button id="send-message">Envoyer Message</button>
		<div id="messages"></div>
	</body>
</html>
