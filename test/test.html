<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Socket.IO Test</title>
		<script src="/socket.io/socket.io.js"></script>
		<script>
			document.addEventListener('DOMContentLoaded', () => {
				const socket = io();

				socket.on('message', (message) => {
					const li = document.createElement('li');
					li.textContent = `From ${message.sender_id} to ${message.receiver_id}: ${message.message_body}`;
					document.getElementById('messages').appendChild(li);
				});

				document.getElementById('sendButton').onclick = () => {
					const senderId = document.getElementById('senderId').value;
					const receiverId =
						document.getElementById('receiverId').value;
					const messageBody =
						document.getElementById('messageBody').value;
					socket.emit('message', {
						senderId,
						receiverId,
						messageBody,
					});
				};
			});
		</script>
	</head>
	<body>
		<h1>Socket.IO Test</h1>
		<input id="senderId" type="text" placeholder="Sender ID" />
		<input id="receiverId" type="text" placeholder="Receiver ID" />
		<input id="messageBody" type="text" placeholder="Message" />
		<button id="sendButton">Send</button>
		<ul id="messages"></ul>
	</body>
</html>
