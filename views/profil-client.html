			}
		</style>
		<link href="/css/profil-client.css" rel="stylesheet" type="text/css" />
		<link href="/css/nav.css" rel="stylesheet" type="text/css" />
		<script src="/public/js/user-auth.js"></script>

	</head>
	<body>
		 <nav>
        <div class="logo">
            <span>PLANIFI</span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/navigation">Services</a></li>
            <li><a href="/contact">Contact Us</a></li>
            <li>
                <div class="dropdown">
                    <button class="dropbtn">Profil</button>
                    <div class="dropdown-content">
                        <a href="#" class="nav-link" id="profile-link"
								>Voir Profil</a
							>
                        <a id="logout-button">Déconnexion</a>
                    </div>
                </div>
            </li>
        </ul>
        <div class="hamburger">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>

		<div class="container">
			<h1>Profil du Client</h1>
			<div class="rounded border border-4 border-dark p-3 w-50"></div>
			<div id="client-profile">
				<!-- Les informations du profil client affichées ici -->
			</div>
			<div class="dropdown-divider" class="mt-4 mb-4"></div>
			<h2>Mes Réservations</h2>
			<div id="reservations-list">
				<!-- Les réservations du client seront affichées ici -->
			</div>
			<div class="dropdown-divider" class="mt-4 mb-4"></div>

		</div>
		</div>


		<!--boite messages -->
		<div class="dropdown-divider" class="mt-4 mb-4"></div>
<h2>Envoyer un Message</h2>
<div id="message-form">
    <input type="text" id="message-subject" placeholder="Objet du message" required/>
    <textarea id="message-body" placeholder="Votre message ici" required></textarea>
    <select id="service-select">
        <!-- Les options seront chargées dynamiquement -->
    </select>
    <button id="send-message">Envoyer</button>

	<input id="fileupload" type="file" name="fileupload" />
	<button class="imageUpload" >envoyer image</button>
</div>

		<script src="/public/js/profil-client.js"></script>
		<script>
	const hamburger = document.querySelector(".hamburger");
	const imageUp = document.querySelector(".imageUpload");
const navLinks = document.querySelector(".nav-links");
const links = document.querySelectorAll(".nav-links li");
const fileToUp = document.querySelector("#fileupload")

hamburger.addEventListener('click', () => {
    // Animer les liens
    navLinks.classList.toggle("open");
    links.forEach(link => {
        link.classList.toggle("fade");
    });

    // Animation du hamburger
    hamburger.classList.toggle("toggle");
});

	imageUp.addEventListener('click', () => {

		var formData = new FormData();

		// Ajout de l'image au FormData
		formData.append('image', fileToUp.files[0]);

		fetch(`/profil/1/update-profil-picture`, {
			method: 'PUT',
			body: formData,
			// Spécification des en-têtes nécessaires pour le téléchargement de fichiers
		})
				.then((response) => response.json())
				.then((service) => {

				})
				.catch((error) => {
					console.error(
							'Erreur lors de la récupération des informations du service :',
							error
					);
				});
	})
		</script>
	</body>
</html>
